{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RideHub Login</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<style>
body{
background:url("/static/images/login-bg.webp") no-repeat center center/cover;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
position:relative;
overflow:hidden;
margin:0;
}
body::before{
content:"";
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.55);
z-index:0;
}
.navbar{
background:#0f172a;
z-index:2;
}
.navbar-brand{
color:white !important;
font-size:30px;
font-weight:bold;
}
.login-box{
background:rgba(255,255,255,0.95);
padding:40px;
width:500px;
border-radius:20px;
text-align:center;
position:relative;
z-index:1;
backdrop-filter:blur(8px);
box-shadow:0 15px 40px rgba(0,0,0,.35);
}
.login-box h2{
font-weight:bold;
margin-bottom:30px;
color:#0f172a;
}
.btn{
transition:.3s;
font-weight:600;
}
.btn:hover{
transform:translateY(-2px);
}
</style>
</head>

<body>

<nav class="navbar navbar-expand-lg fixed-top px-0">
<div class="container-fluid px-3 d-flex justify-content-between align-items-center">
<a class="navbar-brand" href="/">
           <i class="bi bi-car-front-fill"></i>
                RideHub
</a>
<a href="/" class="btn btn-light m-0">
Home
</a>
</div>
</nav>

<div class="login-box">
<h2>
Choose Login Type
</h2>
<a href="{% url 'user_login' %}" class="btn btn-primary btn-lg w-100 mb-3">
👤 Vehicle Renter Login
</a>
<a href="{% url 'owner_login' %}" class="btn btn-success btn-lg w-100">
👤 Vehicle Owner Login
</a>
</div>

</body>
</html>
