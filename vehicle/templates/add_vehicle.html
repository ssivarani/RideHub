{% extends 'owner_base.html' %}
{% block content %}

<div class="row justify-content-center">
<div class="col-lg-8">
<div class="card shadow border-0">
<div class="card-header bg-success text-white">
<h3 class="mb-0">Add New Vehicle</h3>
</div>
<div class="card-body">
<form method="POST" enctype="multipart/form-data">
{% csrf_token %}
<div class="row">
<div class="col-md-6 mb-3">
<label class="form-label">Vehicle Type</label>
<select name="vehicle_type" class="form-select" required>
<option value="">Select Vehicle</option>
<option value="Car">Car</option>
<option value="Bike">Bike</option>
<option value="Auto">Auto</option>
</select>
</div>

<div class="col-md-6 mb-3">
<label class="form-label">Company</label>
<input type="text" name="company" class="form-control" placeholder="Toyota" required>
</div>

<div class="col-md-6 mb-3">
<label class="form-label">Model</label>
<input type="text" name="model" class="form-control" placeholder="Innova" required>
</div>

<div class="col-md-6 mb-3">
<label class="form-label">Vehicle Number</label>
<input type="text" name="number" class="form-control" placeholder="KL 07 AB 1234" required>
</div>

<div class="col-md-6 mb-3">
<label class="form-label">Rent Per Day (₹)</label>
<input type="number" name="rent" class="form-control" placeholder="2500" required>
</div>

<div class="col-md-6 mb-3">
<label class="form-label">Vehicle Image</label>
<input type="file" name="image" class="form-control" accept="image/*" required>
</div>

</div>

<div class="text-center mt-3">
<button class="btn btn-success px-5">
Add Vehicle
</button>
<a href="{% url 'my_vehicles' %}" class="btn btn-secondary ms-2">
Cancel
</a>
</div>
</form>
</div>
</div>
</div>
</div>

{% endblock %}
