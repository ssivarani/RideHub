{% load static %}
<!DOCTYPE html>
<html>
<head>
<title>Owner Login</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body{
background:url("/static/images/login.jpg") no-repeat center center/cover;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}
.login-box{
width:420px;
background:white;
padding:35px;
border-radius:15px;
}
.navbar{
background:#0f172a;
}
.navbar-brand{
color:white!important;
font-size:30px;
font-weight:bold;
}
</style>
</head>

<body>

<!-- navbar    -->
<nav class="navbar navbar-expand-lg fixed-top px-0">
<div class="container-fluid px-3 d-flex justify-content-between align-items-center">
<a class="navbar-brand m-0">🚗 RideHub</a>
<div>
<a href="{% url 'login_choice' %}" class="btn btn-light me-2">Back</a>
<a href="{% url 'home' %}" class="btn btn-light">Home</a>
</div>
</div>
</nav>

<div class="login-box shadow">

<h2 class="text-center mb-4">
🚗 Owner Login
</h2>

{% if messages %}
{% for message in messages %}
<div class="alert alert-{% if message.tags == 'error' %}danger{% else %}success{% endif %} alert-dismissible fade show" role="alert">
    {{ message }}
    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
</div>
{% endfor %}
{% endif %}

<form method="POST">
{% csrf_token %}

<input
name="username"
class="form-control mb-3"
placeholder="Username"
required>

<input
type="password"
name="password"
class="form-control mb-3"
placeholder="Password"
required>

<button class="btn btn-success w-100">
Login
</button>
</form>
<hr>
<p class="text-center">
Don't have an account?
<a href="{% url 'signup' %}">
Register
</a>
</p>
</div>
<!-- footer  -->
 <footer style="background:#0f172a;color:white;text-align:center;padding:12px;position:fixed;bottom:0;left:0;width:100%;">
<p style="margin:0;">© 2026 RideHub. All Rights Reserved.</p>
</footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
