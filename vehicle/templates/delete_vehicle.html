{% extends 'owner_base.html' %}
{% block content %}

<div class="row justify-content-center">
<div class="col-md-6">
<div class="card shadow">
<div class="card-body text-center">
<img src="{{ vehicle.image.url }}" class="img-fluid rounded mb-3" style="height:250px;object-fit:cover;">

<h3 class="text-danger">Delete Vehicle</h3>

<p class="mt-3">
Are you sure you want to delete
<strong>{{ vehicle.company }} {{ vehicle.model }}</strong>?
</p>

<div class="alert alert-warning">
This action cannot be undone.
</div>

<form method="POST">
{% csrf_token %}
<button class="btn btn-danger">
Yes, Delete Vehicle
</button>
<a href="{% url 'vehicle_details' vehicle.id %}" class="btn btn-secondary">
Cancel
</a>
</form>

</div>
</div>
</div>
</div>

{% endblock %}
