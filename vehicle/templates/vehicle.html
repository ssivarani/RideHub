<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vehicle Details</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-dark">
<div class="container-fluid">
<a class="navbar-brand fw-bold">🚗 Vehicle Details</a>
<a href="{% url 'all_vehicles' %}" class="btn btn-light">Back</a>
</div>
</nav>

<div class="container mt-5">
<div class="row justify-content-center">

<div class="col-lg-5">
<img src="{{ vehicle.image.url }}" class="img-fluid rounded shadow" style="width:100%;height:350px;object-fit:cover;">
</div>

<div class="col-lg-7">
<div class="card shadow">
<div class="card-body">

<h2>{{ vehicle.company }}</h2>
<h5 class="text-muted">{{ vehicle.model }}</h5>

<hr>

<p><strong>Vehicle Type :</strong> {{ vehicle.vehicle_type }}</p>
<p><strong>Vehicle Number :</strong> {{ vehicle.number }}</p>
<p><strong>Rent Per Day :</strong> ₹{{ vehicle.rent }}</p>
<p>
<strong>Status :</strong>
{% if vehicle.available %}
<span class="badge bg-success">Available</span>
{% else %}
<span class="badge bg-danger">Booked</span>
{% endif %}
</p>

<div class="d-grid mt-3">
<a href="{% url 'book_vehicle' vehicle.id %}" class="btn btn-primary">
Book Now
</a>
</div>

</div>
</div>
</div>
</div>
</div>
</body>
</html>
